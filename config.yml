---
configure_terminal: false
configure_osx: true
configure_dotfiles: true

configure_dock: true
dockitems_remove:
  - Launchpad
  - Safari
  - Mail
  - Maps
  - Photos
  - Calendar
  - Contacts
  - Reminders
  - Notes
  - TV
  - Music
  - Podcasts
  - News
  - FaceTime
  - Messages
  - "App Store"
  - Freeform
  - Keynote
  - Numbers
  - Pages
  - Games
  - "iPhone Mirroring"
  - Phone
  - Apps

dockitems_persist:
  - name: "System Settings"
    path: "/Applications/System Settings.app"
    pos: 1
  - name: "Ghostty"
    path: "{{ ansible_env.HOME }}/Applications/Ghostty.app"
    pos: 2
  - name: "Brave Browser"
    path: "{{ ansible_env.HOME }}/Applications/Brave Browser.app"
    pos: 3

dotfiles_repo: https://github.com/nqui/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/code/dotfiles
dotfiles_files:
  - .zshrc
  - .gitignore
  - .osx
  - .vimrc
  - .config/pip/pip.conf
  - .nanorc
  - .gitconfig
  - .config/iterm2/iterm-profiles.json
  - .config/ghostty/config
  - "Library/Application Support/Rectangle/RectangleConfig.json"

homebrew_installed_packages:
  # - ansible # Installed via Pip.
  - git
  - httpie
  - ssh-copy-id
  - openssl
  - wget
  - zsh-history-substring-search
  - zsh-autosuggestions
  - nano
  - nanorc
  - zsh
  - starship
  - tree
  - jq
  - mise

# Match the HOMEBREW_CASK_OPTS appdir set in .zshrc so playbook installs
# end up in the same place as manual `brew install --cask` runs.
homebrew_cask_appdir: "{{ ansible_env.HOME }}/Applications"

# Casks requiring installation to /Applications (system extensions, security
# tooling) are installed by post-install.sh with an explicit --appdir override.
homebrew_cask_apps:
  - orbstack
  - discord
  - goland
  - webstorm
  - pycharm
  - datagrip
  - rider
  - brave-browser
  - rectangle
  - spotify
  - vlc
  - balenaetcher
  - protonvpn
  - hey-desktop
  - proton-mail
  - monitorcontrol
  - font-fira-code-nerd-font
  - claude
  - claude-code
